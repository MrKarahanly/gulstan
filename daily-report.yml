name: Daily i-teka report

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python scripts/daily_it_eka_report.py --city astana

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: i-teka-report
          path: reports/*.xlsx
